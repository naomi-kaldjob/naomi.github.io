<!DOCTYPE html>
<html>
<head>
  <title>QCM</title>

  <style>
    body {
      font-family: Arial;
    }
    .question-card {
  background: #f5f7ff;
  padding: 20px;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.option {
  display: block;
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  border: 2px solid transparent;
}

.option:hover {
  background: #e0e7ff;
}

input[type="radio"] {
  display: none;
}

input[type="radio"]:checked + span {
  background: #667eea;
  color: white;
  border-radius: 8px;
  padding: 5px 10px;
}
.question-card {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
    /* 🔥 MODAL */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modalContent {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
    }

    #startBtn {
      padding: 12px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }

    #quizContainer {
      display: none;
    }
  </style>

</head>
  <!-- 🔥 WELCOME POPUP -->
  
<div id="modal">
  
  <div id="modalContent">
    <h2>👋 Bienvenue !</h2>

    <p>
      Ce quiz a pour objectif de tester vos connaissances sur le thème du service civique et des institutions.
    </p>

    <p>
      👉 Répondez aux questions à choix unique  
      👉 Cliquez sur “Valider” à la fin  
      👉 Votre score sera affiché automatiquement
    </p>

    <button id="startBtn" onclick="startQuiz()">Commencer le quiz</button>
  </div>
</div>
<body>
<!-- 🔥 QUIZ -->
<div id="quizContainer">

  <h1>Mon Quiz</h1>
  <div id="quiz"></div>
  <button onclick="submitQuiz()">Valider</button>

</div>

<script>
let quizPromise;

function preloadQuiz() {
  quizPromise = fetch("https://n8n-qcm-service-civique.onrender.com/webhook/qcm-service")
    .then(res => res.json());
}

// 🚀 lancé immédiatement
preloadQuiz();
async function loadQuiz() {
  const raw = await quizPromise;;
  const data = raw[0];

  const quizDiv = document.getElementById("quiz");

  data.questions.forEach((q, qi) => {
  const qDiv = document.createElement("div");
  qDiv.className = "question-card";

  let optionsHTML = "";

  q.options.forEach((opt, oi) => {
    optionsHTML += `
      <label class="option">
        <input type="radio" name="q${qi}" value="${oi}">
        <span>${opt}</span>
      </label>
    `;
  });

  qDiv.innerHTML = `
    <h3>${q.text}</h3>
    ${optionsHTML}
  `;

  quizDiv.appendChild(qDiv);
});

  window.quizData = data;
}

/* 🚀 START BUTTON */
function startQuiz() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("quizContainer").style.display = "block";

  loadQuiz();
}

function submitQuiz() {
  let score = 0;

  window.quizData.questions.forEach((q, qi) => {
    const checked = document.querySelector(`input[name=q${qi}]:checked`);

    if (checked && parseInt(checked.value) === q.correctOptionIndex) {
      score++;
    }
  });

  alert("Score : " + score + "/" + window.quizData.questions.length);
}

</script>

</body>
</html>
