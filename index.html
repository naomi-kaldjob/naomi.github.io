<!DOCTYPE html>
<html>
<head>
  <title>QCM</title>

  <style>
    body {
      font-family: Arial;
    }
  #progress {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #667eea;
  transition: width 0.3s;
}

#timer {
  font-size: 18px;
  margin-bottom: 10px;
  font-weight: bold;
}

.question-card {
  background: #f5f7ff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.option {
  display: block;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid #ddd;
  transition: 0.2s;
}

.option.correct {
  background: #4ade80;
  color: white;
  border-color: #16a34a;
}

.option.wrong {
  background: #f87171;
  color: white;
  border-color: #dc2626;
}
    /* 🔥 MODAL */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modalContent {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
    }

    #startBtn {
      padding: 12px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }

    #quizContainer {
      display: none;
    }
  </style>

</head>
  <!-- 🔥 WELCOME POPUP -->
  
<div id="modal">
  
  <div id="modalContent">
    <h2>👋 Bienvenue !</h2>

    <p>
      Ce quiz a pour objectif de tester vos connaissances sur le thème du service civique et des institutions.
    </p>

    <p>
      👉 Répondez aux questions à choix unique  
      👉 Cliquez sur “Valider” à la fin  
      👉 Votre score sera affiché automatiquement
    </p>

    <button id="startBtn" onclick="startQuiz()">Commencer le quiz</button>
  </div>
</div>
<body>
<!-- 🔥 QUIZ -->
<div id="quizContainer">

  <h1>Mon Quiz</h1>
  <div id="quiz"></div>
  <button onclick="submitQuiz()">Valider</button>

</div>

<script>
let quizData;
let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 10;

// 🔥 PRELOAD API
let quizPromise;

function preloadQuiz() {
  quizPromise = fetch("https://n8n-qcm-service-civique.onrender.com/webhook/qcm-service")
    .then(res => res.json());
}

preloadQuiz();

function startQuiz() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("quizContainer").style.display = "block";

  loadQuiz();
}

// 🔥 LOAD DATA
async function loadQuiz() {
  const raw = await quizPromise;
  quizData = raw[0];

  showQuestion();
}

// 🔥 AFFICHER UNE QUESTION
function showQuestion() {
  const q = quizData.questions[currentQuestion];
  const quizDiv = document.getElementById("quiz");

  quizDiv.innerHTML = "";

  const card = document.createElement("div");
  card.className = "question-card";

  card.innerHTML = `<h3>${q.text}</h3>`;

  q.options.forEach((opt, oi) => {
    const label = document.createElement("label");
    label.className = "option";

    label.innerHTML = `
      <input type="radio" name="option" value="${oi}">
      ${opt}
    `;

    label.onclick = () => selectAnswer(label, oi, q.correctOptionIndex);
    card.appendChild(label);
  });

  quizDiv.appendChild(card);

  updateProgress();
  startTimer();
}

// 🔥 TIMER
function startTimer() {
  clearInterval(timer);
  timeLeft = 10;

  document.getElementById("timer").innerText = `Temps : ${timeLeft}s`;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = `Temps : ${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

// 🔥 RÉPONSE
function selectAnswer(label, selected, correct) {
  clearInterval(timer);

  const options = document.querySelectorAll(".option");

  options.forEach(opt => {
    opt.style.pointerEvents = "none";
  });

  if (selected === correct) {
    label.classList.add("correct");
    score++;
  } else {
    label.classList.add("wrong");
    options[correct].classList.add("correct");
  }

  setTimeout(nextQuestion, 1200);
}

// 🔥 QUESTION SUIVANTE
function nextQuestion() {
  currentQuestion++;

  if (currentQuestion >= quizData.questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

// 🔥 PROGRESSION
function updateProgress() {
  const percent = (currentQuestion / quizData.questions.length) * 100;

  document.getElementById("progress").innerHTML = `
    <div id="progressBar" style="width:${percent}%"></div>
  `;
}

// 🔥 RESULTAT
function showResult() {
  document.getElementById("quiz").innerHTML = `
    <div class="question-card">
      <h2>Quiz terminé 🎉</h2>
      <p>Score : ${score} / ${quizData.questions.length}</p>
    </div>
  `;

  document.getElementById("timer").innerHTML = "";
}

</script>

</body>
</html>
